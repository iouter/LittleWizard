name: Release
on:
  push:
    tags: ["v*"]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Restore dependencies
        run: dotnet restore
      - name: Setup Godot Action
        uses: chickensoft-games/setup-godot@v2.4.1
        with:
          version: 4.5.1
          use-dotnet: true
          include-templates: true
      - name: Get Godot executable path
        id: godot-path
        run: |
          echo "GODOT_EXE=$(which godot)" >> $GITHUB_OUTPUT
      - name: Clean Godot Cache
        run: |
          rm -rf ~/.godot/
          rm -rf ${{ github.workspace }}/.godot/mono/temp/
          mkdir -p ${{ github.workspace }}/.godot/mono/temp/bin/Release/publish/
      - name: Download and install Spine GDExtension
        run: |
          wget -O spine.zip "https://spine-godot.s3.eu-central-1.amazonaws.com/4.2/4.5.1-stable/spine-godot-extension-4.2-4.5.1-stable.zip"
          unzip spine.zip -d spine_temp
          mkdir -p "${{ github.workspace }}/bin"
          cp -r spine_temp/bin/* "${{ github.workspace }}/bin/"
      - name: Debug Environment
        run: |
          echo "=== Godot Version ==="
          ${{ steps.godot-path.outputs.GODOT_EXE }} --version
          echo "=== .csproj Configuration ==="
          grep -A5 "Configuration" LittleWizard.csproj || true
          echo "=== Output Directory ==="
          ls -la .godot/mono/temp/bin/ 2>/dev/null || echo "No .godot dir yet"
          echo "=== Spine Extension Files ==="
          ls -la bin/ 2>/dev/null || echo "No bin/ dir"
          ls -la *.gdextension 2>/dev/null || echo "No .gdextension in root"
      - name: Publish
        run: dotnet publish -c Release
        env:
          GodotPath: ${{ steps.godot-path.outputs.GODOT_EXE }}
          ModsPath: ${{ github.workspace }}/mods_output/
      - name: Package Release Artifacts
        run: |
          cd mods_output/LittleWizard
          zip -r ../../LittleWizard-v${{ steps.version.outputs.version }}.zip .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LittleWizard-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
